<p-toast key="compacct-toast" baseZIndex="99999"></p-toast>
<div class="row">
    <div class="col-xs-12">
        <div class="box box-primary">
            <div class="form-horizontal">
                <div class="box-body">
                   <p-tabView>
                     <form name="HearingBlCrmAppointmentMultipleForm" #HearingBlCrmAppointmentMultipleForm="ngForm" novalidate>
                        <div class="form-group">
                            <div class="col-sm-3">
                                <label class="control-label">Patient Name</label>
                                <input class="form-control"
                                    name="ContactName"
                                    #ContactName="ngModel"
                                    [(ngModel)]="patientInfo.Contact_Name"
                                    disabled>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Booking Date</label>
                                <input class="form-control"
                                    name="BookingDate"
                                    #BookingDate="ngModel"
                                    [(ngModel)]="patientInfo.Booking_Date"
                                    disabled>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Package Name</label>
                                <input class="form-control"
                                    name="PackageName"
                                    #PackageName="ngModel"
                                    [(ngModel)]="patientInfo.Package_Name"
                                    disabled>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">Sale Bill No</label>
                                <input class="form-control"
                                    name="SaleBillNo"
                                    #SaleBillNo="ngModel"
                                    [(ngModel)]="patientInfo.Sale_Bill_No"
                                    disabled>
                            </div>
                        </div>
                        <br>
                        <div class="row" *ngIf="sessionDetails.length">
                            <div class="col-sm-7">
                                <div class="table-responsive no-padding">
                                   <p-table [value]="sessionDetails"
                                        [rowHover]="true"
                                        #dt>
                                        <ng-template pTemplate="header">
                                            <tr>
                                                <th>Session</th>
                                                <th>Appointment Date</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-col>
                                            <tr>
                                                <td>{{col.Session_Name}}</td>
                                                <td>
                                                    <ejs-datetimepicker
                                                        [(value)]="col.Appointment_Date"
                                                        [format]="'dd/MMM/yyyy hh:mm a'">
                                                    </ejs-datetimepicker>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div class="row" *ngIf="sessionDetails.length">
                            <div class="col-sm-12">
                                <button type="button" class="btn btn-primary pull-right" (click)="saveAppointments()">
                                    <i class="fa fa-save"></i> Save
                                </button>
                            </div>
                        </div>

                    </form>
                   </p-tabView>
                </div>
            </div>
        </div>
    </div>
</div>
